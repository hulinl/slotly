services:
  postgres:
    image: postgres:16-alpine
    container_name: slotly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: slotly
      POSTGRES_PASSWORD: slotly_dev_password
      POSTGRES_DB: slotly
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotly -d slotly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slotly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MailHog: catches outgoing email locally for testing verification flows etc.
  # Web UI at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: slotly-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres-data:
  redis-data:
