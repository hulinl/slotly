services:
  postgres:
    image: postgres:16-alpine
    container_name: slotly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: slotly
      POSTGRES_PASSWORD: slotly_dev_password
      POSTGRES_DB: slotly
    # Host port 25432 to coexist with other dev databases (olaf/flowly) on
    # 5432. Inside the docker network containers still talk on 5432.
    ports:
      - "25432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotly -d slotly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slotly-redis
    restart: unless-stopped
    # Host port 26379 to coexist with other dev redises (olaf/flowly).
    # Inside the docker network containers still talk on 6379.
    ports:
      - "26379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MailHog: catches outgoing email locally for testing verification flows etc.
  # Web UI at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: slotly-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  # Celery worker — picks up jobs enqueued on the broker and runs them
  # against the Django ORM. Code is bind-mounted from the host so dev
  # iteration only needs `docker compose restart celery-worker` after a
  # tasks.py change. (No autoreload by design — kept dev simple.)
  celery-worker:
    build: ./backend
    container_name: slotly-celery-worker
    restart: unless-stopped
    command: celery -A slotly_api worker -l info --concurrency=2
    working_dir: /app
    volumes:
      - ./backend:/app
    environment: &celery-env
      DJANGO_SETTINGS_MODULE: slotly_api.settings
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-celery-dev-only-INSECURE-replace-me}
      DATABASE_URL: postgres://slotly:slotly_dev_password@postgres:5432/slotly
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
      EMAIL_USE_TLS: "False"
      DEFAULT_FROM_EMAIL: no-reply@slotly.local
      CALENDAR_URL_ENCRYPTION_KEY: ${CALENDAR_URL_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A slotly_api inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery beat — fires the periodic schedule defined in
  # slotly_api.settings.CELERY_BEAT_SCHEDULE (every 5 minutes:
  # calendars.sync_all_due, which in turn enqueues a sync_one per Calendar).
  # The schedule shelve file is persisted on a named volume so beat doesn't
  # double-fire jobs across container restarts.
  celery-beat:
    build: ./backend
    container_name: slotly-celery-beat
    restart: unless-stopped
    command: celery -A slotly_api beat -l info -s /var/lib/celery/celerybeat-schedule
    working_dir: /app
    volumes:
      - ./backend:/app
      - celerybeat-data:/var/lib/celery
    environment: *celery-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  celerybeat-data:
